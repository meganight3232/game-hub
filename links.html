<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Hub - Links</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loginOverlay" class="overlay">
    <div class="login-panel">
      <div class="login-glow"></div>
      <h1>Nova Hub</h1>
      <p class="login-sub">Enter password to continue</p>
      <input type="password" id="passwordInput" placeholder="Password" />
      <button id="loginButton">Unlock</button>
      <p id="loginMessage" class="error-msg"></p>
    </div>
  </div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <span>Nova Hub</span>
    </div>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="links.html" class="active">Links</a>
    </nav>

    <button id="logoutButton" class="logout-btn">Logout</button>
  </header>

  <main class="page">
    <section class="page-header">
      <div>
        <div class="hero-badge">Links</div>
        <h1>Extra Resources</h1>
        <p>Store any other allowed links here.</p>
      </div>
    </section>

    <section class="card-grid">
      <article class="game-card">
        <div class="card-top">
          <span class="card-tag">Resource</span>
        </div>
        <h3>Example Link</h3>
        <p>Useful site or tool you want quick access to.</p>
        <a href="https://example.com" target="_blank" rel="noopener noreferrer" class="open-btn">Visit</a>
      </article>

      <article class="game-card">
        <div class="card-top">
          <span class="card-tag">Tool</span>
        </div>
        <h3>Another Link</h3>
        <p>Replace this with one of your own links.</p>
        <a href="https://example.org" target="_blank" rel="noopener noreferrer" class="open-btn">Visit</a>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
