<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Hub - Links</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loginOverlay" class="overlay">
    <div class="login-box">
      <h1>Enter Password</h1>
      <p>This site is protected.</p>
      <input type="password" id="passwordInput" placeholder="Password" />
      <button id="loginButton">Login</button>
      <p id="loginMessage" class="error-msg"></p>
    </div>
  </div>

  <header>
    <h1>Game Hub</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="links.html">Links</a>
      <button id="logoutButton" class="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h2>Links</h2>
      <p>Use this page for other allowed resources.</p>
    </section>

    <section class="card-grid">
      <div class="card">
        <h3>Example Link 1</h3>
        <p>Replace this with your own link.</p>
        <a class="card-link" href="https://example.com" target="_blank" rel="noopener noreferrer">Visit</a>
      </div>

      <div class="card">
        <h3>Example Link 2</h3>
        <p>Replace this with your own link.</p>
        <a class="card-link" href="https://example.org" target="_blank" rel="noopener noreferrer">Visit</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
