<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Hub - Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loginOverlay" class="overlay">
    <div class="login-box">
      <h1>Enter Password</h1>
      <input type="password" id="passwordInput" placeholder="Password" />
      <button id="loginButton">Login</button>
      <p id="loginMessage" class="error-msg"></p>
    </div>
  </div>

  <header>
    <h1>Game Hub</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="links.html">Links</a>
      <button id="logoutButton" class="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h2>Games</h2>
      <p>Click a site below to open games.</p>
    </section>

    <section class="card-grid">

      <div class="card">
        <h3>Game Site 1</h3>
        <p>Large collection of browser games.</p>
        <a class="card-link" href="https://sites.google.com/site/unblockedwtf/" target="_blank">
          Open
        </a>
      </div>

      <div class="card">
        <h3>Game Site 2</h3>
        <p>Compilation of different games.</p>
        <a class="card-link" href="https://sites.google.com/site/thegamecompilation/home" target="_blank">
          Open
        </a>
      </div>

      <div class="card">
        <h3>Game Site 3</h3>
        <p>Rewind-style game list.</p>
        <a class="card-link" href="https://sites.google.com/site/unblockedgamestop/rewind" target="_blank">
          Open
        </a>
      </div>

      <div class="card">
        <h3>Game Site 4</h3>
        <p>Huge list of browser games.</p>
        <a class="card-link" href="https://sites.google.com/view/classroom66?authuser=0" target="_blank">
          Open
        </a>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
